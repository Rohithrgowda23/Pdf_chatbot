spring.application.name=pdf-chatbot

spring.datasource.url=jdbc:mysql://localhost:3306/pdfchat?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=2003
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2:1b
spring.ai.ollama.chat.options.temperature=0.3

spring.ai.ollama.embedding.options.model=nomic-embed-text

spring.ai.vectorstore.qdrant.host=localhost
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.collection-name=pdf_chunks
spring.ai.vectorstore.qdrant.use-tls=false
spring.ai.vectorstore.qdrant.initialize-schema=true

app.jwt.secret=8f3K9qP2vL7xR4mN6tY1wZ5cB0dE8gH3jU9sA2fD6iQ7oM4pV1nX5rT8yC0uW3zK
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

app.aws.region=us-east-1
app.aws.s3.bucket-name=pdf-chatbot-files
app.aws.access-key=your-access-key
app.aws.secret-key=your-secret-key
app.storage.upload-dir=./uploads/pdfs

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

app.oauth2.redirect-uri=http://localhost:5173/oauth2/redirect

app.rag.chunk-size=1000
app.rag.chunk-overlap=200
app.rag.top-k=5
app.rag.similarity-threshold=0.7

app.cors.allowed-origins=http://localhost:3000,http://localhost:5173


server.port=8080
server.compression.enabled=true

logging.level.com.pdfchat=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.ai=INFO

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized