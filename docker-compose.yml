version: "3.8"
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 2003
      MYSQL_DATABASE: pdfchat
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./pdf-chatbot-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pdfchat?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_AI_VECTORSTORE_QDRANT_HOST: qdrant
      SPRING_AI_OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      - mysql
      - qdrant

volumes:
  mysql_data:
  qdrant_data:
